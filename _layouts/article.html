---
layout: default
---

<article>
    <section class="artigoHead">
        <h1>{{ page.title }}</h1>
        <h2>{{ page.description }}</h2>
        <span class="artigoHead--mais">
            <p class="artigoHead--mais-p">Por {{ page.author }} · {{ page.date | date: "%d/%m/%Y" }}</p>
        </span>
    </section>
    {{ content }}
</article>
